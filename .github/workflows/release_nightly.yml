# Privacy fork nightly bundle: macOS aarch64 only, unsigned.
# See PRIVACY-MODE.md for the rationale and what was stripped out.
#
# The bundle is unsigned because this fork has no Apple Developer
# credentials. macOS Gatekeeper will block first launch — right-click
# the app and choose "Open" once to allow it.
name: release_nightly

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  CARGO_INCREMENTAL: '0'

concurrency:
  group: release-nightly
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  bundle_mac_aarch64:
    if: github.repository_owner == 'diegorv'
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain from rust-toolchain.toml
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup target add aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly-mac
          cache-on-failure: true

      - name: Set release channel to nightly
        run: |
          version=$(git rev-parse --short HEAD)
          echo "Publishing version: ${version} on release channel nightly"
          echo "nightly" > crates/zed/RELEASE_CHANNEL

      - name: Bundle macOS app and .dmg
        run: ./script/bundle-mac aarch64-apple-darwin

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: Zed-aarch64.dmg
          path: target/aarch64-apple-darwin/release/Zed-aarch64.dmg
          if-no-files-found: error
          retention-days: 14
