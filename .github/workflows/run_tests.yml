# Privacy fork CI: runs on macOS only.
# See PRIVACY-MODE.md for the rationale and what was stripped out.
name: run_tests

on:
  push:
    branches:
      - fork
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  CARGO_INCREMENTAL: '0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  tests_mac:
    if: github.repository_owner == 'diegorv'
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain from rust-toolchain.toml
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add clippy rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests-mac
          cache-on-failure: true

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: clippy (workspace, all features)
        run: ./script/clippy

      - name: cargo nextest run
        run: cargo nextest run --workspace --no-fail-fast --no-tests=warn
